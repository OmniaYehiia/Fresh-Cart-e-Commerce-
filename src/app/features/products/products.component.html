<div class="bg-linear-to-br from-[#1AAF51] via-[#1FBB58] to-[#30CC68] text-white mb-5">
  <div class="container mx-auto px-4 py-10 sm:py-14">
    <nav class="flex items-center gap-2 text-sm text-white/70 mb-6 flex-wrap">
      <a class="hover:text-white transition-colors" routerLink="/home">
        Home
      </a>
      <span class="text-white/40">/</span>
      <span class="text-white font-medium">All Products</span>
    </nav>
    <div class="flex items-center gap-5">
      <div
        class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30">
        <svg data-prefix="fas" data-icon="box-open" class="svg-inline--fa fa-box-open size-8" role="img"
          viewBox="0 0 640 512" aria-hidden="true">
          <path fill="currentColor"
            d="M560.3 237.2c10.4 11.8 28.3 14.4 41.8 5.5 14.7-9.8 18.7-29.7 8.9-44.4l-48-72c-2.8-4.2-6.6-7.7-11.1-10.2L351.4 4.7c-19.3-10.7-42.8-10.7-62.2 0L88.8 116c-5.4 3-9.7 7.4-12.6 12.8L27.7 218.7c-12.6 23.4-3.8 52.5 19.6 65.1l33 17.7 0 53.3c0 23 12.4 44.3 32.4 55.7l176 99.7c19.6 11.1 43.5 11.1 63.1 0l176-99.7c20.1-11.4 32.4-32.6 32.4-55.7l0-117.5zm-240-9.8L170.2 144 320.3 60.6 470.4 144 320.3 227.4zm-41.5 50.2l-21.3 46.2-165.8-88.8 25.4-47.2 161.7 89.8z">
          </path>
        </svg>
      </div>
      <div>
        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">All Products</h1>
        <p class="text-white/80 mt-1">Explore our complete product collection</p>
      </div>
    </div>
  </div>
</div>

<div class="container mx-auto my-5">
  <div class="mb-6 text-sm text-gray-500">Showing {{productList().length}} products</div>
  <div class="grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5">
    @for (prod of productList() | paginate: { id: 'productsPagination',
    itemsPerPage: pageSize(),
    currentPage: p(),
    totalItems: total() }; track prod._id) {
    <app-product-card [data]="prod" [wish]="wishListItems().some(w => w._id === prod._id)"></app-product-card>
    }
  </div>

  <div class="flex justify-center mt-10">
    <pagination-controls id="productsPagination" (pageChange)="pageChanged($event)"
      (pageBoundsCorrection)="pageChanged($event)" previousLabel="Previous" nextLabel="Next">
    </pagination-controls>
  </div>
</div>
