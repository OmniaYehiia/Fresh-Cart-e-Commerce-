<div class="bg-linear-to-br from-green-600 via-green-500 to-green-400 text-white">
  <div class="container mx-auto px-4 py-12 sm:py-16">
    <nav class="flex items-center gap-2 text-sm text-white/70 mb-6">
      <a class="hover:text-white transition-colors" routerLink="/home">Home</a>
      <span class="text-white/40">/</span>
      <a class="hover:text-white transition-colors" routerLink="/categories">Categories</a><span
        class="text-white/40">/</span>
      <span class="text-white/40">Subcategories</span>
    </nav>
    <div class="flex items-center gap-5">
      <div
        class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30">
        <svg data-prefix="fas" data-icon="box-open" role="img" viewBox="0 0 640 512" aria-hidden="true"
          class="svg-inline--fa fa-box-open size-8">
          <path fill="currentColor"
            d="M560.3 237.2c10.4 11.8 28.3 14.4 41.8 5.5 14.7-9.8 18.7-29.7 8.9-44.4l-48-72c-2.8-4.2-6.6-7.7-11.1-10.2L351.4 4.7c-19.3-10.7-42.8-10.7-62.2 0L88.8 116c-5.4 3-9.7 7.4-12.6 12.8L27.7 218.7c-12.6 23.4-3.8 52.5 19.6 65.1l33 17.7 0 53.3c0 23 12.4 44.3 32.4 55.7l176 99.7c19.6 11.1 43.5 11.1 63.1 0l176-99.7c20.1-11.4 32.4-32.6 32.4-55.7l0-117.5zm-240-9.8L170.2 144 320.3 60.6 470.4 144 320.3 227.4zm-41.5 50.2l-21.3 46.2-165.8-88.8 25.4-47.2 161.7 89.8z">
          </path>
        </svg>
      </div>
      <div>
        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">All SubCategories</h1>
      </div>
    </div>
  </div>
</div>

<div class="container mx-auto my-10">
  <a class="inline-flex items-center gap-2 text-gray-600 hover:text-primary-600 transition-colors mb-6"
    routerLink="/categories">
    <svg data-prefix="fas" data-icon="arrow-left" class="svg-inline--fa fa-arrow-left size-3" role="img"
      viewBox="0 0 512 512" aria-hidden="true">
      <path fill="currentColor"
        d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 288 480 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-370.7 0 105.4-105.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z">
      </path>
    </svg>
    <span>Back to Categories</span>
  </a>
  <div class="mb-6">
    <h2 class="text-lg font-bold text-gray-900">{{subCategoryList().length}} Subcategories in Music</h2>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
    @for (subcat of subCategoryList(); track subcat._id) {
    <a
      class="group cursor-pointer bg-white rounded-2xl border border-gray-100 p-6 shadow-sm hover:shadow-xl hover:border-green-200 transition-all duration-300 hover:-translate-y-1">
      <div
        class="w-14 h-14 rounded-xl bg-green-50 flex items-center justify-center mb-4 group-hover:bg-green-100 transition-colors">
        <svg data-prefix="fas" data-icon="folder-open" class="svg-inline--fa fa-folder-open size-8 text-green-600"
          role="img" viewBox="0 0 576 512" aria-hidden="true">
          <path fill="currentColor"
            d="M56 225.6L32.4 296.2 32.4 96c0-35.3 28.7-64 64-64l138.7 0c13.8 0 27.3 4.5 38.4 12.8l38.4 28.8c5.5 4.2 12.3 6.4 19.2 6.4l117.3 0c35.3 0 64 28.7 64 64l0 16-365.4 0c-41.3 0-78 26.4-91.1 65.6zM477.8 448L99 448c-32.8 0-55.9-32.1-45.5-63.2l48-144C108 221.2 126.4 208 147 208l378.8 0c32.8 0 55.9 32.1 45.5 63.2l-48 144c-6.5 19.6-24.9 32.8-45.5 32.8z">
          </path>
        </svg>
      </div>
      <h3 class="font-bold text-gray-900 text-lg group-hover:text-green-600 transition-colors mb-2">{{subcat.name}}</h3>
      <div class="flex items-center gap-2 text-sm text-green-600 opacity-0 group-hover:opacity-100 transition-opacity">
        <span>Browse Products</span>
        <svg data-prefix="fas" data-icon="arrow-right" class="svg-inline--fa fa-arrow-right size-3" role="img"
          viewBox="0 0 512 512" aria-hidden="true">
          <path fill="currentColor"
            d="M502.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l370.7 0-105.4 105.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z">
          </path>
        </svg>
      </div>
    </a>
    }
  </div>
</div>
